# Full microservice stack:
#   docker compose --profile microservice up -d
# Or set COMPOSE_PROFILES=microservice in .env so `docker compose up -d` starts the full stack.
#
# Mock-only single container (no profile): docker-compose.mock.yml → http://localhost:8050
#
# Mock demo UI via this file (static data, no APIs): http://localhost:8051
#   docker compose --profile mock up -d
# Uses APP_MODE=mock on service app-mock. Stop the default `app` container if port 8051 is enough.
#
# PostgreSQL: APIs read DB_* from .env (external database). Optional local Postgres: --profile with-db
#
# Dash UI only (no APIs in Compose): docker compose up -d app
# For app-only, set DATACENTER_API_URL / CUSTOMER_API_URL / QUERY_API_URL in .env to reachable URLs
# (e.g. host.docker.internal:8000 if APIs run on the host).

services:
  app:
    build:
      context: .
      args:
        APP_BUILD_ID: ${APP_BUILD_ID:-local}
    container_name: datalake-platform-gui-app
    ports:
      - "8050:8050"
    env_file:
      - .env
    environment:
      # Matches image label; override when rebuilding to verify new UI: APP_BUILD_ID=$(git rev-parse --short HEAD) docker compose up -d --build app
      APP_BUILD_ID: ${APP_BUILD_ID:-local}
      # Override .env when APIs run as Compose services (same Docker network)
      DATACENTER_API_URL: ${DATACENTER_API_URL:-http://datacenter-api:8000}
      CUSTOMER_API_URL: ${CUSTOMER_API_URL:-http://customer-api:8000}
      QUERY_API_URL: ${QUERY_API_URL:-http://query-api:8000}
    volumes:
      - ./data:/app/data
    networks:
      - datalake

  # Mock profile: Dash with APP_MODE=mock (no HTTP calls to microservices). UI on host port 8051.
  app-mock:
    build:
      context: .
      args:
        APP_BUILD_ID: ${APP_BUILD_ID:-local}
    container_name: datalake-platform-gui-app-mock
    ports:
      - "8051:8050"
    env_file:
      - .env
    environment:
      APP_BUILD_ID: ${APP_BUILD_ID:-local}
      APP_MODE: mock
    volumes:
      - ./data:/app/data
    networks:
      - datalake
    profiles:
      - mock

  db:
    image: postgres:15
    container_name: datalake-platform-gui-db
    environment:
      POSTGRES_DB: datalake
      POSTGRES_USER: datalakeui
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datalakeui -d datalake"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - datalake
    profiles:
      - with-db

  redis:
    image: redis:7-alpine
    container_name: datalake-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - datalake
    profiles:
      - microservice

  datacenter-api:
    build:
      context: ./services/datacenter-api
      dockerfile: Dockerfile
    container_name: datalake-datacenter-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    networks:
      - datalake
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

  customer-api:
    build:
      context: ./services/customer-api
      dockerfile: Dockerfile
    container_name: datalake-customer-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    networks:
      - datalake
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

  query-api:
    build:
      context: ./services/query-api
      dockerfile: Dockerfile
    container_name: datalake-query-api
    ports:
      - "8002:8000"
    env_file:
      - .env
    networks:
      - datalake
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - microservice

networks:
  datalake:
    driver: bridge

volumes:
  pgdata:
  redis_data:
