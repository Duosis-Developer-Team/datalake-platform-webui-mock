# Apply first (or use kubectl create secret ...). Name prefix 00- keeps `kubectl apply -f k8s-mock/` ordering safe.
# kubectl create secret generic datalake-webui-mock-auth-secrets \
#   --from-literal=POSTGRES_PASSWORD='...' \
#   --from-literal=SECRET_KEY='...' \
#   --from-literal=ADMIN_DEFAULT_PASSWORD='Admin123!' \
#   --from-literal=FERNET_KEY='' \
#   --from-literal=API_JWT_SECRET=''
#
# POSTGRES_PASSWORD is used by Postgres and as AUTH_DB_PASS for the Dash pod.
apiVersion: v1
kind: Secret
metadata:
  name: datalake-webui-mock-auth-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: "replace-with-strong-password"
  SECRET_KEY: "replace-with-long-random-flask-secret"
  ADMIN_DEFAULT_PASSWORD: "Admin123!"
  FERNET_KEY: ""
  API_JWT_SECRET: ""
