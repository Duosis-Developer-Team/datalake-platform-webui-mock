# Mock UI (APP_MODE=mock) + PostgreSQL auth DB. http://localhost:8050
#   docker compose -f docker-compose.mock.yml up -d --build
# Login: admin / ADMIN_DEFAULT_PASSWORD (default Admin123!) unless AUTH_DISABLED=true.
#
# Auth DB host port 5434 avoids clashing with Datalake-Platform-GUI auth-db on 5433.

services:
  auth-db:
    image: postgres:15
    container_name: datalake-webui-mock-auth-db
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-datalake_auth}
      POSTGRES_USER: ${AUTH_DB_USER:-authadmin}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:-change_me_auth}
    ports:
      - "5434:5432"
    volumes:
      - mock_auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-authadmin} -d ${AUTH_DB_NAME:-datalake_auth}"]
      interval: 5s
      timeout: 5s
      retries: 10

  webui-mock:
    build:
      context: .
      args:
        APP_BUILD_ID: ${APP_BUILD_ID:-local}
    container_name: datalake-webui-mock
    ports:
      - "8050:8050"
    environment:
      APP_BUILD_ID: ${APP_BUILD_ID:-local}
      APP_MODE: mock
      APP_BRAND_TITLE: ${APP_BRAND_TITLE:-Datalake WebUI}
      AUTH_DB_HOST: auth-db
      AUTH_DB_PORT: "5432"
      AUTH_DB_NAME: ${AUTH_DB_NAME:-datalake_auth}
      AUTH_DB_USER: ${AUTH_DB_USER:-authadmin}
      AUTH_DB_PASS: ${AUTH_DB_PASS:-change_me_auth}
      SECRET_KEY: ${SECRET_KEY:-change_me_secret_key}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-Admin123!}
      FERNET_KEY: ${FERNET_KEY:-}
      API_JWT_SECRET: ${API_JWT_SECRET:-}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
    depends_on:
      auth-db:
        condition: service_healthy

volumes:
  mock_auth_pgdata:
