apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulutistan-customer-api
  labels:
    app: bulutistan-customer-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bulutistan-customer-api
  template:
    metadata:
      labels:
        app: bulutistan-customer-api
    spec:
      containers:
        - name: bulutistan-customer-api
          image: bulutistan-customer-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: bulutistan-customer-api-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: bulutistan-customer-api-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: bulutistan-customer-api-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: bulutistan-customer-api-config
                  key: DB_USER
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: bulutistan-customer-api-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: bulutistan-customer-api-config
                  key: REDIS_PORT
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: bulutistan-customer-api-secret
                  key: DB_PASS
