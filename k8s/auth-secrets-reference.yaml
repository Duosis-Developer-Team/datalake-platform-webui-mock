# Reference only — apply as a base for your cluster secrets.
# kubectl create secret generic datalake-auth-secrets \
#   --from-literal=SECRET_KEY=... \
#   --from-literal=AUTH_DB_PASS=... \
#   --from-literal=FERNET_KEY=... \
#   --from-literal=API_JWT_SECRET=...
apiVersion: v1
kind: Secret
metadata:
  name: datalake-auth-secrets
type: Opaque
stringData:
  SECRET_KEY: "replace-with-long-random"
  AUTH_DB_PASS: "replace-auth-db-password"
  FERNET_KEY: "optional-fernet-material"
  API_JWT_SECRET: "same-as-dash-or-dedicated-jwt-signing-secret"
