apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulutistan-frontend
  labels:
    app: bulutistan-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bulutistan-frontend
  template:
    metadata:
      labels:
        app: bulutistan-frontend
    spec:
      containers:
        - name: bulutistan-frontend
          image: bulutistan-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8050
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8050
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8050
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          env:
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: bulutistan-frontend-config
                  key: API_BASE_URL
          envFrom:
            - configMapRef:
                name: bulutistan-frontend-config
