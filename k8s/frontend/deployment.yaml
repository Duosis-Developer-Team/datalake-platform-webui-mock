apiVersion: apps/v1
kind: Deployment
metadata:
  name: datalake-frontend
  labels:
    app: datalake-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: datalake-frontend
  template:
    metadata:
      labels:
        app: datalake-frontend
    spec:
      containers:
        - name: datalake-frontend
          image: datalake-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8050
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8050
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8050
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          envFrom:
            - configMapRef:
                name: datalake-frontend-config
            - secretRef:
                name: datalake-auth-secrets
