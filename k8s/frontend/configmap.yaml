apiVersion: v1
kind: ConfigMap
metadata:
  name: datalake-frontend-config
data:
  DATACENTER_API_URL: "http://datalake-datacenter-api"
  CUSTOMER_API_URL: "http://datalake-customer-api"
  QUERY_API_URL: "http://datalake-query-api"
  # Auth PostgreSQL (non-secret keys). Set AUTH_DB_HOST to your auth DB endpoint.
  AUTH_DB_HOST: "replace-with-auth-postgres-host"
  AUTH_DB_PORT: "5432"
  AUTH_DB_NAME: "datalake_auth"
  AUTH_DB_USER: "authadmin"
  AUTH_DISABLED: "false"
